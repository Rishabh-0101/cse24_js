<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Salary Management System</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="Experiment2.css">

</head>
<body>

<div class="title-box">
    <h1 class="main-title">Employee Salary Management System</h1>
    <p class="subtitle">Manage employee records and salary information easily</p>
</div>

<div class="main-container">

    
    <div class="container">

        <h2>Add Employee</h2>

        <div class="input-box">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="name" placeholder="Enter Employee Name">
        </div>


        <div class="input-box">
            <i class="fa-solid fa-id-badge"></i>
            <input type="text" id="employeeId" placeholder="Enter Employee ID">
        </div>

        <div class="input-box">
            <i class="fa-solid fa-dollar-sign"></i>
            <input type="number" id="salary" placeholder="Enter Salary">
        </div>

        <div class="input-box">
            <i class="fa-solid fa-building"></i>
            <input type="text" id="department" placeholder="Enter Department">
        </div>
        
        <button onclick="addEmployee()">Add Employee</button>
        <button onclick="displayEmployees()">Display Employees</button>
        <button onclick="filterSalary()">Salary > 50000</button>
        <button onclick="totalSalary()">Total Salary</button>
        <button onclick="averageSalary()">Average Salary</button>
        <button onclick="countDepartment()">Count by Department</button>

    </div>

    
    <div id="output">
        <h2>Results will appear here</h2>
    </div>

</div>

<script src="Experiment2.js"></script>

</body>
</html>
