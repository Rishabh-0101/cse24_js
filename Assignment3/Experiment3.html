<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Experiment3.css">
    <title>Document</title>
</head>
<body>
    <div class="Box">
        <h1>Welcome to javaScript Lab</h1>
        <div id="inputs">
            <input id="input" type="text" placeholder="Enter new heading text">
        </div>
        <div id="sBox">
            <div onclick="changeHeading()" id="button">Change Heading</div>
            <div onclick="changeBackground()" id="button">Change Background</div>
            <div onclick="increaseSize()" id="button">Increase For Size</div>
            <div onclick="paragraphHide()" id="button">Show Hide Paragraph</div>
            <div onclick="reset()" id="button">Reset</div>
        </div>
        <p>This is a sample paragraph. javaScriptevents can dynamically change content.</p>
    </div>
    <script src="Experiment3.js"></script>
</body>
</html>
